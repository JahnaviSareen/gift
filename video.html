<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Message</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial, Helvetica, sans-serif;
}

/* heading */

h1{
    margin-bottom:30px;
    color:#444;
}

/* video container */

.video-box{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

/* video */

video{
    width:700px;
    max-width:90vw;
    border-radius:15px;
}

</style>
</head>

<body>

<h1>A Special Message For You ❤️</h1>

<div class="video-box">

<video controls>
    <source src="videos/message.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

</div>

</body>
</html>
