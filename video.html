<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Message</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial, Helvetica, sans-serif;
}

/* heading */

h1{
    margin-bottom:30px;
    font-family: cursive;
    font-size: 40px;
}

/* video container */

.video-box{
    background:white;
    padding:8px;
    border-radius:8px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

/* video */

video{
    width:900px;
    max-width:90vw;
    border-radius:6px;
}

.cursor{
    width:35px;
    height:35px;
    border:4px solid #7e7fafb3;
    border-radius:50%;
    position:fixed;
    pointer-events:none;
    transform:translate(-50%, -50%);
    z-index:9999;
}

</style>
</head>

<body>
    <div class="cursor"></div>

<h1>Chotu sa Video🫰🏻</h1>

<div class="video-box">

<video controls>
    <source src="main_video.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

</div>
<script src="loader.js"></script>

</body>
</html>
