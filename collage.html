<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    /* background:#fff6f9; */
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

/* heading */

.title{
    text-align: center;
    margin-top: 40px;
    font-size: 40px;
    font-family: cursive;
    text-decoration: underline;
}

/* gallery grid */

.gallery{
    width:90%;
    margin:38px auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:35px;
}

/* card */

.card{
    position:relative;
    overflow:hidden;
    border-radius:5px;
    cursor:pointer;
    transition:0.4s;
    height:300px;
}

/* image */

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.4s;
}

/* video */

.card video{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.4s;
}

/* text */

.card h2{
    position:absolute;
    top:46%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:22px;
    opacity:0;
    transition:0.4s;
    text-align:center;
    font-family: system-ui;
}

/* hover effects */

.card:hover{
    transform:scale(1.07);
}

.card:hover img,
.card:hover video{
    filter:blur(3px) brightness(70%);
}

.card:hover h2{
    opacity:1;
}


/* -------- Individual image adjustments -------- */

.img1{ object-position:center -69px; }

.img2{ object-position:center 40%; }

.img3{ object-position:left center; }

.img4{ object-position:center -112px; }

.img5{ object-position:center 34%; }

.img6{ object-position:center 40%; }

.img7{ object-position:center 40%; }

.video1{ object-position:center; }

</style>
</head>

<body>

<h1 class="title">Memories hi Memories🦄</h1>

<div class="gallery">

<div class="card">

</div>

<div class="card">
<img src="images/4.jpeg" class="img2">
<h2>Me hun photo toh achi ayegi hi😒</h2>
</div>
