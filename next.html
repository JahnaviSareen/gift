}

.bucket .card div{
    justify-content:center;
    margin-top: 50px;
}

/* Hover effect */

.bucket div:hover{
    transform:scale(1.08);
    background:#ffd6e7;
    cursor:pointer;
}

.card{
    text-decoration:none;
}

.b1, .b2, .b3{
    width: 344px;
    height: 219px;
    /* border:3px solid #7e7fafb3; */
    border-radius:35px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    transition:0.3s;
    margin-top: 30px;
    position: relative;
}

.b1:hover, .b2:hover, .b3:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.bucket img{
    width: 350px;
    height: 510px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom: -200px;
}

.headingg h1{
    margin: 75px 0px -34px 0px;
    text-align: center;
    font-weight: 600;
    font-size: 44px;
    font-family: cursive;
}

/* Hide text initially */

.b1 h1, .b2 h1, .b3 h1{
    opacity: 0;
    position: absolute;
    color: #ff6262;
    font-size: 35px;
    transition: 0.3s;
    text-align: center;
    margin-top: 240px;
    font-family: cursive;
    text-decoration: underline;
}

/* On hover show text + blur image */

.b1:hover img,
.b2:hover img,
.b3:hover img{
filter:blur(2px);
}

.b1:hover h1,
.b2:hover h1,
.b3:hover h1{
opacity:1;
}

.headingg h1{
margin: 75px 0px -34px 0px;
text-align: center;
text-decoration: underline;
}
